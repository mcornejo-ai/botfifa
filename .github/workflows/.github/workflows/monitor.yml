name: FIFA Ticket Monitor

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: logs/
          key: fifa-monitor-state-${{ github.run_number }}
          restore-keys: |
            fifa-monitor-state-

      - name: Restore cookies
        run: |
          mkdir -p config
          echo "${{ secrets.FIFA_COOKIES_B64 }}" | base64 -d > config/cookies.json

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CI_SINGLE_RUN: "true"
        run: |
          cd monitor
          python fifa_monitor.py

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
